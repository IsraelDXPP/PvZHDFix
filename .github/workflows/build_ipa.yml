name: Build PvZHDFix Modded IPA

on:
  push:
    branches: [master, main]
    paths:
      - 'hooks/**'
      - 'patch_ipa.py'
      - '.github/workflows/build_ipa.yml'
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL directa del IPA original (sobreescribe el Secret IPA_URL)'
        required: false
        type: string

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip3 install lief

      - name: Instalar ldid
        run: brew install ldid

      - name: Compilar insert_dylib desde fuente
        run: |
          git clone --depth 1 https://github.com/Tyilo/insert_dylib /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -quiet -configuration Release 2>&1 | tail -5
          sudo cp build/Release/insert_dylib /usr/local/bin/insert_dylib

      - name: Buscar IPA local o descargar
        id: ipa
        run: |
          # Prioridad: IPA en el repo > workflow_dispatch > Secret IPA_URL
          if [ -f "PvZ_HD.ipa" ]; then
            echo "Usando IPA local del repo"
            cp PvZ_HD.ipa input.ipa
          elif [ -n "${{ github.event.inputs.ipa_url }}" ]; then
            echo "Descargando desde workflow_dispatch URL"
            curl -L "${{ github.event.inputs.ipa_url }}" -o input.ipa
          elif [ -n "${{ secrets.IPA_URL }}" ]; then
            echo "Descargando desde Secret IPA_URL"
            curl -L "${{ secrets.IPA_URL }}" -o input.ipa
          else
            echo "ERROR: No se encontró IPA."
            echo "Sube PvZ_HD.ipa al repo o configura IPA_URL en Settings -> Secrets -> Actions"
            exit 1
          fi
          echo "Tamaño: $(du -sh input.ipa | cut -f1)"

      - name: Obtener iOS SDK
        id: sdk
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "path=$SDK" >> $GITHUB_OUTPUT
          echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Fix libarclite (Xcode 15+ removed it)
        run: |
          ARC_DIR="/Applications/Xcode_15.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/arc"
          if [ ! -f "$ARC_DIR/libarclite_iphoneos.a" ]; then
            sudo mkdir -p "$ARC_DIR"
            for ARCH in arm64 armv7; do
              xcrun -sdk iphoneos clang -arch $ARCH -c -x c -o /tmp/empty_$ARCH.o /dev/null
            done
            sudo lipo -create /tmp/empty_arm64.o /tmp/empty_armv7.o \
              -output "$ARC_DIR/libarclite_iphoneos.a"
            echo "Created dummy libarclite_iphoneos.a (arm64+armv7)"
          fi

      - name: Compilar PvZHDFix.dylib (arm64 + armv7)
        run: |
          SDK="${{ steps.sdk.outputs.path }}"
          xcrun clang \
            -arch arm64 \
            -arch armv7 \
            -isysroot "$SDK" \
            -dynamiclib \
            -o PvZHDFix.dylib \
            hooks/PvZHDFix.m \
            hooks/fishhook.c \
            -framework SystemConfiguration \
            -framework Foundation \
            -framework UIKit \
            -fobjc-arc \
            -O2 \
            -miphoneos-version-min=8.0 \
            -install_name "@rpath/PvZHDFix.dylib" \
            -Wno-deprecated-declarations
          echo "=== Dylib compilado ==="
          file PvZHDFix.dylib
          lipo -info PvZHDFix.dylib
          ls -lh PvZHDFix.dylib

      - name: Parchear + inyectar dylib en IPA
        run: python3 patch_ipa.py input.ipa PvZHD_UnlockAll.ipa

      - name: Verificar IPA final
        run: |
          python3 - <<'EOF'
          import zipfile
          with zipfile.ZipFile('PvZHD_UnlockAll.ipa') as z:
              print("=== Archivos clave ===")
              for n in z.namelist():
                  b = n.split('/')[-1]
                  if b in ('pvz',) or 'PvZHDFix' in n or '_CodeSignature' in n:
                      print(f"  {n}")
          print("OK - IPA listo")
          EOF
          ls -lh PvZHD_UnlockAll.ipa

      - name: Subir IPA como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PvZHD_UnlockAll_Mod-${{ github.run_number }}
          path: PvZHD_UnlockAll.ipa
          retention-days: 30

      - name: Subir IPA como release asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        continue-on-error: true
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "PvZHD UnlockAll Mod - Build ${{ github.run_number }}"
          body: |
            **Mod automático compilado en commit `${{ github.sha }}`**

            ### Cambios
            ${{ github.event.head_commit.message }}

            ### Contenido del mod
            - ✅ Texto "Acerca de" → "Unlock All" (hook en NSData/NSString)
            - ✅ Desbloqueo automático de todo el contenido al lanzar el juego
            - ✅ Fixes de red (SCNetworkReachability) para no crashear en iOS 8
            - ✅ NSURLConnection sync request bloqueado
            - ✅ SafariServices → weak link (compatible iPad Mini 1)

            ### Instalar
            ```bash
            ideviceinstaller -i PvZHD_UnlockAll.ipa
            ```
          files: PvZHD_UnlockAll.ipa
          draft: false
          prerelease: false
